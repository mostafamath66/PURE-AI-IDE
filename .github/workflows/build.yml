name: PURE-AI-Universal-Bundler
on: [push]

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Structure & Fetch Dependencies
        shell: pwsh
        run: |
          # 1. إنشاء المجلدات
          $dirs = @("bin", "src", "DevRoom/Includes", "DevRoom/Libs")
          foreach ($dir in $dirs) { if (!(Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force } }

          # 2. تحميل المحركات الأساسية (TCC)
          Invoke-WebRequest -Uri "http://download.savannah.gnu.org" -OutFile "tcc.zip"
          Expand-Archive -Path "tcc.zip" -DestinationPath "temp_tcc" -Force
          Copy-Item "temp_tcc/tcc/tcc.exe" "bin/tcc.exe" -Force

          # 3. تحميل 7-Zip DLL
          Invoke-WebRequest -Uri "https://www.7-zip.org" -OutFile "7z_inst.exe"
          Start-Process ./7z_inst.exe -ArgumentList "/S /D=$pwd\temp_7z" -Wait
          Copy-Item "./temp_7z/7z.dll" "./bin/7z.dll" -Force

          # 4. إنشاء ملف فارغ لـ AI Brain (لأن الحجم كبير، سننشئ ملفاً وهمياً لنجاح التجميع)
          if (!(Test-Path "bin/ai_brain.bin")) { New-Item -ItemType File -Path "bin/ai_brain.bin" -Value "AI Stub" }
          
          # 5. إنشاء ملف الويب سيرفر (Dummy) إذا لم يوجد
          if (!(Test-Path "bin/micro-server.exe")) { Copy-Item "bin/tcc.exe" "bin/micro-server.exe" }

      - name: Auto-Generate Resources.rc
        shell: pwsh
        run: |
          # إنشاء ملف الموارد برمجياً لضمان صحة المسارات 100%
          $rcContent = @"
          IDR_TCC_EXE      RCDATA    "../bin/tcc.exe"
          IDR_7Z_DLL       RCDATA    "../bin/7z.dll"
          IDR_AI_BRAIN     RCDATA    "../bin/ai_brain.bin"
          IDR_WEB_SERVER   RCDATA    "../bin/micro-server.exe"
          "@
          Set-Content -Path "src/Resources.rc" -Value $rcContent -Encoding UTF8

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile PURE-AI
        shell: cmd
        run: |
          rc src/Resources.rc
          cl.exe /O2 /MT src/Main.cpp src/Resources.res user32.lib shell32.lib gdi32.lib advapi32.lib ole32.lib /out:PURE-AI-Programmer.exe

      - name: Upload Final Portable IDE
        uses: actions/upload-artifact@v4
        with:
          name: PURE-AI-Standalone-Package
          path: PURE-AI-Programmer.exe
